	<body>
		<div class="container">
			<div class="title">
				<h1>Task List</h1>
			</div>

			<div>
				<table border="1">
					<thead>
						<tr>
							<th>ID</th>
							<th>Username</th>
							<th>Content</th>
							<th>Complete</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="task : ${tasks}">
							<td th:text="${task.id}"></td>
							<td th:text="${task.username}"></td>
							<td th:text="${task.content}"></td>
							<td th:text="${task.complete} ? 'true' : 'false'"></td>
						</tr>
					</tbody>
				</table>
			</div>

			<div class="form-container-input">
				<form action="/admin/delete/task" method="POST">
					<div>
						<label for="taskId">Task ID:</label>
					</div>
					<div><input type="text" id="taskId" name="taskId" th:value="${selectedTaskId}" /></div>
					<div class="scott-button">
						<button type="submit">Delete</button>
					</div>
				</form>
			</div>

			<div class="scott-button">
				<p>
					<a th:href="@{/admin/index}">Return to Index</a>
				</p>
			</div>
		</div>
	</body>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Login Page</title>

		<style>
			* {
				padding: 0px;
				margin: 0px;
			}

			body {
				font-family: Arial, sans-serif;
				background-color: rgb(100, 195, 238);
				display: flex;
				align-items: center;
				justify-content: center;
				height: 100vh;
				margin: 0;
				font-size: 15px;
			}

			div.container {
				display: flex;
				flex-direction: column;
				justify-content: center;
				align-items: center;
				background-color: #fff;
				width: auto;

				max-height: auto;
				padding: 30px;
				border-radius: 2rem;
				box-shadow: 0 2px 5px rgba(0, 0, 0, 0.9);
			}

			h2 {
				text-align: center;
				margin-bottom: 20px;
				font-size: 3rem;
				color: green;
			}

			div.form-group {
				margin-top: 1rem;
				margin-bottom: 1rem;
				min-width: 100%;
				min-height: 100%;
			}

			div.form-group label {
				font-size: 2rem;
			}
			input#username,
			input#password {
				margin-top: 25px;
				margin-bottom: 25px;
				width: 100%;
				height: 3rem;
				font-size: 1rem;
			}

			input[type="text"],
			input[type="password"] {
				width: 100%;
				padding: 10px;
				border: 1px solid #ccc;
				border-radius: 4px;
				box-sizing: border-box;
			}

			button.scott-button {
				display: block;
				background-color: #4caf50;
				color: white;
				font-size: 2rem;
				min-height: 3rem;
				min-height: 3rem;
				width: 50rem;
				border: none;
				border-radius: 4px;
				cursor: pointer;

				margin-top: 1rem;
			}

			button.scott-button:hover {
				background-color: aqua;
			}
		</style>
	</head>

	<body>
		<div class="container">
			<div>
				<div>
					<h2>Login</h2>
				</div>

				<div>
					<div th:if="${param.error}">Invalid username or password.</div>
					 

					<form th:action="@{/login}" method="post">
						<div class="form-group">
							<label for="username">UserName(Email):</label> <input type="text" id="username" name="username" required />
						</div>

						<div class="form-group">
							<label for="password">Password:</label> <input type="password" id="password" name="password" required />
						</div>

						<button class="scott-button" type="submit">Login</button>
					</form>
				</div>

				<div>
					<form action="/register" method="get">
						<button class="scott-button" type="submit">Register New User</button>
					</form>
				</div>

				<div>
					<form action="/user/home" method="get">
						<button class="scott-button" type="submit">USER Home</button>
					</form>
				</div>

				<div>
					<form action="/admin/home" method="get">
						<button class="scott-button" type="submit">ADMIN Home</button>
					</form>
				</div>
				<div>
					<form action="/logout" method="get">
						<button class="scott-button" type="submit">Logout page</button>
					</form>
				</div>
			</div>
		</div>
	</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<title>Task List</title>
	</head>
	<style>
		html {
			display: flex;
			flex-direction: column;
			align-items: center;
		}

		body {
			display: flex;
			flex-direction: column;
			align-items: center;
			font-family: sans-serif;
			/* Use a generic sans-serif font for a clean look */
			margin: 20px;
			/* Add some margin around the page content */
			color: black;
			background-color: #ffffff;
			width: 90%;
			height: 100vh;
			/* border: solid 5px red; */
			font-size: 15px;
		}

		th,
		td,
		tbody {
			padding: 10px;
			/* Add padding to table cells for better readability */
			border: 2px solid #365930;
		}

		th {
			background-color: #04aa6d;
			/* Set a light background color for table headers */
			color: white;
			/* Set header text color */
		}

		button {
			width: 1000px;
			height: auto;
			background-color: transparent;
			border: none;
		}

		button.scott-button div {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			background-color: #04aa6d;
			width: 15rem;
			height: 5rem;
			font-size: 2rem;
			color: white;
			border-radius: 2rem;
			text-decoration:none;
		}
		
				button.scott-button div a{

			text-decoration:none;
		}



		div.container {
			display: flex;
			flex-direction: column;
			width: 100%;
			height: auto;
			text-align: center;
		}

		div.container div.title h1 {
			color: green;
			font-size: 5rem;
			padding: auto;
			margin: auto;
		}
	</style>

	<body>
		<div class="container">
			<div class="title">
				<h1>Task List</h1>
			</div>
			<div>
				<table border="1">
					<thead>
						<tr>
							<th>ID</th>
							<th>Username</th>
							<th>Content</th>
							<th>Complete</th>
				
						</tr>
					</thead>
					<tbody>
						<tr th:each="task : ${tasks}">
							<td th:text="${task.id}"></td>
							<td th:text="${task.username}"></td>
							<td th:text="${task.content}"></td>
							<td th:text="${complete} ? 'true' : 'false'"></td>
						</tr>
					</tbody>
				</table>
			</div>

			 

			<button class="scott-button">
				<div>
					<a th:href="@{/admin/index}">Return Home</a>
				</div>
			</button>
		</div>
	</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />

	<title>Admin Create Task Update</title>

	<style>
		html {
			display: flex;
			flex-direction: column;
			align-items: center;
		}

		body {
			display: flex;
			flex-direction: column;
			align-items: center;
			font-family: sans-serif;
			/* Use a generic sans-serif font for a clean look */
			margin: 20px;
			/* Add some margin around the page content */
			color: black;
			background-color: #ffffff;
			width: 90%;
			height: 100vh;
			/* border: solid 5px red; */
			font-size: 15px;
		}

		th,
		td,
		tbody {
			padding: 10px;
			/* Add padding to table cells for better readability */
			border: 2px solid #365930;
		}

		th {
			background-color: #04aa6d;
			/* Set a light background color for table headers */
			color: white;
			/* Set header text color */
		}

		button {
			width: 1000px;
			height: auto;
			background-color: transparent;
			border: none;
		}

		div.scott-button,
		div.scott-button button {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			background-color: #04aa6d;
			width: 15rem;
			height: 5rem;
			font-size: 2rem;
			color: white;
			border-radius: 2rem;
			text-decoration: none;
			margin: 1rem;
		}

		div.container form {
			display: flex;
			flex-direction: column;
			min-width: 100%;
			height: auto;
			text-align: center;
		}

		div.container {
			color: green;
			font-size: 1.25rem;
			padding: auto;
			margin: auto;
		}

		div.form-container-input {
			margin-top: 5rem;
		}

		div.form-container-input form {
			margin-top: 5rem;
			border: solid 5px green;
			border-radius: 1rem;
			color: white;
			display: flex;
			justify-content: center;
			align-items: center;
		}

		div.form-container-input form input {
			color: green;
			width: 50%;
			border: solid 2px green;
			font-size: 2rem;
			text-align: center;
		}

		div.container form {
			color: green;
			font-size: 1.5rem;
			padding: auto;
			margin: auto;
		}

		div.scott-button a {
			color: white;
			text-decoration: none;
		}

		div form textarea {
			border-radius: 0.5rem;
			box-shadow: 0 8px 16px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
			width: 100%;
			height: auto;
		}
	</style>
</head>

<body>
	<div class="container">
		<div class="title">
			<h1>Task List</h1>
		</div>

		<div>
			<table border="1">
				<thead>
					<tr>
						<th>ID</th>
						<th>Username</th>
						<th>Content</th>
						<th>Complete</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="task : ${tasks}">
						<td th:text="${task.id}"></td>
						<td th:text="${task.username}"></td>
						<td th:text="${task.content}"></td>
						<td th:text="${task.complete} ? 'true' : 'false'"></td>
					</tr>
				</tbody>
			</table>
		</div>

		<div class="form-container-input">

			<form action="/admin/update/task" th:object="${myTaskDto}" th:value="${selectedTaskId}" method="post">
				<div>
					<label for="taskId">Task ID:</label>
				</div>
				<div>
					<input type="text" id="taskId" name="taskId" th:value="${selectedTaskId}" />
				</div>

				<div>
					<h1>Enter Task Details</h1>
				</div>
				
				<div class="task-input">
					<div><label for="content">Message Content:</label><br /></div>

					<div><textarea name="content" rows="4" cols="50"></textarea><br /></div>
					<div class="task-complete">
						<label for="complete">Task Complete Status: </label> <input type="checkbox" name="complete"
							id="complete" />
					</div>
				</div>



				<div class="scott-button">
					<button type="submit">Update Task ID</button>
				</div>
			</form>
		</div>



	</div>
</body>

</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8" />
	<title>Register Form</title>

	<link rel="stylesheet" href="registerStyle.css" />

	<style>
		body {
			background-color: rgb(100, 195, 238);
			display: block;
			text-align: center;
			position: relative;
			margin-left: auto;
			margin-right: auto;
			font-size: large;
			font-style: bold;
			color: #04aa6d;
			font-size: 15px;
		}

		div.form-container {
			background-color: rgb(78, 176, 97);
			border-radius: 15px;
			color: green;
			padding: 20px 35px;
			text-align: center;
			text-decoration: none;
			display: inline-block;
			font-size: 1.5rem;
			margin: 1rem;
			box-shadow: 0 8px 16px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
			max-width: 600px;
			width: 100%;
			height: auto;
		}

		div.scott-button button {
			background-color: rgb(103, 206, 103);
			border-radius: 10px;
			color: white;
			padding: 20px 35px;
			text-align: center;
			display: inline-block;
			font-size: 1.5rem;
			margin: 20px;
			max-width: 400px;
			width: 100%;
			height: auto;
			border: none;
			box-shadow: 0 8px 16px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
			text-decoration: none;
		}

		div.scott-button>button>a {
			text-decoration: none;
			color: white;
		}

		div.form-container {
			margin-top: 5rem;
			font-size: 1.5rem;
		}

		div.form-container>form {
			background-color: light-green;
			max-width: 800px;
			margin-top: 2rem;
			padding: 20px;
			color: green;
			/* border: 0px solid #b92121; */
			border: none;
			box-shadow: 0 8px 16px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
			border-radius: 10px;
			display: block;
			background-color: #f5f5f5;
		}

		form label {
			font-size: 1.5rem;
		}

		select {
			width: 100%;
			height: auto;
			padding: 10px;
			margin-bottom: 15px;
			border: 5px solid #ccc;
			border-radius: 3px;
			font-size: 1.25rem;
		}

		/* Input fields */
		input[type="text"],
		input[type="password"] {
			text-align: left;
			width: 90%;
			height: auto;
			padding: 10px;
			margin-bottom: 15px;
			border: 5px solid #ccc;
			border-radius: 3px;
			font-size: 1.25rem;
		}

		/* Input fields */
		input[type="date"] {
			text-align: center;
			width: 90%;
			height: auto;
			padding: 10px;
			margin-bottom: 15px;
			border: 5px solid #ccc;
			border-radius: 3px;
			font-size: 1.25rem;
		}
	</style>
</head>

<body>
	<div class="form-container">
		<form action="/register" th:object="${myUser}" method="post">
			<h1>Enter User Credentials</h1>

			<label for="email">Email :</label><br /> <input type="text" name="email" /> <br /> <label
				for="password">Password
				:</label><br /> <input type="text" name="password" /> <br /> <label for="role">Role :</label><br />
			<select type="text" name="role">
				<option value=""></option>
				<option value="ADMIN">ADMIN</option>
				<option value="USER">USER</option>
				<option value="ADMIN,USER">ADMIN, USER</option>
			</select> <label for="dob">DOB :</label><br /> <input type="date" name="dob" /> <br /> <label
				for="gender">Gender:</label><br />
			<select type="text" name="gender">
				<option value=""></option>
				<option value="male">Male</option>
				<option value="female">Female</option>
			</select> <br />

			<div class="scott-button">
				<button type="submit">Submit</button>
			</div>
		</form>

		<div class="scott-button">
			<button>
				<a th:href="@{/}">Home Page</a>
			</button>
		</div>
	</div>
</body>

</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<title>Index</title>

		<link rel="stylesheet" href="/static/registerStyle.css" />
	</head>
	<style>
		body {
			background-color: rgb(100, 195, 238);
			display: flex;
			flex-direction: column;
			align-items: center;
			text-align: center;
			position: relative;
			margin-left: auto;
			margin-right: auto;
			font-size: large;
			font-style: bold;
			color: white;
			font-size: 15px;
		}

		.buttons > p > a {
			background-color: rgb(103, 206, 103);
			/* Green */
			border: none;
			color: white;
			padding: 20px 35px;
			text-align: center;
			text-decoration: none;
			display: inline-block;
			font-size: 2rem;
			border-radius: 5px;
			margin: 20px;
			width: 80%;
			height: auto;
		}

		.pagination {
			display: inline-block;
		}

		.pagination a {
			color: black;
			float: left;
			padding: 8px 16px;
			text-decoration: none;
		}

		div.container {
			margin-top: 10rem;
			border-radius: 15px;
			display: flex;
			flex-direction: column;
			background-color: rgb(78, 176, 97);
			max-width: 50rem;
			box-shadow: rgba(50, 50, 93, 0.25) 0px 50px 100px -20px, rgba(0, 0, 0, 0.3) 0px 30px 60px -30px,
				rgba(10, 37, 64, 0.35) 0px -2px 6px 0px inset;
		}

		div.container div p a {
			box-shadow: rgba(0, 0, 0, 0.3) 0px 19px 38px, rgba(0, 0, 0, 0.22) 0px 15px 12px;
		}

		h1 {
			padding: 1rem;
			font-size: 3rem;
			text-shadow: 2px 4px 3px rgba(0, 0, 0, 0.3);
		}
	</style>

	<body>
		<div class="container">
			<h1>Task Manager API</h1>

			<div class="buttons">
				<p>
					<a th:href="@{/login}">Login</a>
				</p>
			</div>

			<div class="buttons">
				<p>
					<a th:href="@{/register}">Create New User</a>
				</p>
			</div>
			
			
			<div class="buttons">
				<p>
					<a th:href="@{/create/task}">Create New Task</a>
				</p>
			</div>


			<div class="buttons">
				<p>
					<a th:href="@{/create/task}">Create New Task</a>
				</p>
			</div>
				<p>
					<a th:href="@{/admin/user/delete/{id}}">Delete User</a>
				</p>
			</div>

			<div class="buttons">
				<p>
					<a th:href="@{/logout}"> Logout</a>
				</p>
			</div>
		</div>
	</body>
</html>
